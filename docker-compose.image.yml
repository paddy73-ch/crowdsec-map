services:
  crowdsec-map:
    image: ghcr.io/paddy73-ch/crowdsec-map:latest
    container_name: crowdsec-map
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      DATA_SOURCE: "auto"
      REFRESH_SECONDS: "30"
      CROWDSEC_CONTAINER: "crowdsec"
      CSCLI_COMMAND: "cscli alerts list -o json --limit 250"
      LAPI_URL: "${LAPI_URL:-http://crowdsec:8080}"
      LAPI_LOGIN: "${LAPI_LOGIN:-}"
      LAPI_PASSWORD: "${LAPI_PASSWORD:-}"
      LAPI_API_KEY: "${LAPI_API_KEY:-}"
      PUBLIC_TARGET_IP: "${PUBLIC_TARGET_IP:-}"
      PUBLIC_TARGET_IP_AUTO: "${PUBLIC_TARGET_IP_AUTO:-true}"
      PUBLIC_TARGET_IP_REFRESH_MINUTES: "${PUBLIC_TARGET_IP_REFRESH_MINUTES:-60}"
      HISTORY_FILE: "/app/data/history.jsonl"
      HISTORY_RETENTION_DAYS: "90"
      CTI_API_KEY: "${CTI_API_KEY:-}"
      CTI_CACHE_FILE: "/app/data/cti-cache.json"
      CTI_CACHE_HOURS: "72"
      TRUST_PROXY: "${TRUST_PROXY:-true}"
      ACCESS_LOG_ENABLED: "${ACCESS_LOG_ENABLED:-false}"
      ACCESS_LOG_FILE: "/app/data/access-log.jsonl"
      ACCESS_LOG_RETENTION_DAYS: "${ACCESS_LOG_RETENTION_DAYS:-30}"
      INVESTIGATION_LOG_PATHS: "${INVESTIGATION_LOG_PATHS:-/opt/security-stack/zoraxy/config/log/*.log,/opt/security-stack/authelia/config/authelia.log,/var/log/pveproxy/access.log}"
      INVESTIGATION_MAX_LINES: "${INVESTIGATION_MAX_LINES:-50}"
      INVESTIGATION_TIMEOUT_MS: "${INVESTIGATION_TIMEOUT_MS:-8000}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - crowdsec-map-data:/app/data
      # Optional for the IP Investigation panel. Enable only when these host paths exist.
      # - /opt/security-stack/zoraxy/config/log:/opt/security-stack/zoraxy/config/log:ro
      # - /opt/security-stack/authelia/config/authelia.log:/opt/security-stack/authelia/config/authelia.log:ro
      # - /var/log/pveproxy/access.log:/var/log/pveproxy/access.log:ro

volumes:
  crowdsec-map-data:
