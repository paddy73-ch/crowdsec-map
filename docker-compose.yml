services:
  crowdsec-map:
    build: .
    container_name: crowdsec-map
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      DATA_SOURCE: "auto"
      REFRESH_SECONDS: "30"

      # Variante A: cscli im bestehenden CrowdSec-Container ausfuehren.
      # Dafuer Docker-Socket mounten und den Container-Namen setzen.
      CROWDSEC_CONTAINER: "crowdsec"
      CSCLI_COMMAND: "cscli alerts list -o json --limit 250"

      # Variante B: LAPI Alerts mit Watcher-Credentials.
      LAPI_URL: "${LAPI_URL:-http://crowdsec:8080}"
      LAPI_LOGIN: "${LAPI_LOGIN:-}"
      LAPI_PASSWORD: "${LAPI_PASSWORD:-}"

      # Variante C: LAPI Decisions mit Bouncer-Key.
      LAPI_API_KEY: "${LAPI_API_KEY:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - security-stack_proxy

networks:
  security-stack_proxy:
    external: true
